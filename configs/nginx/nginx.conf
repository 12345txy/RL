# Standalone nginx for vLLM load balancing (use with scripts/nginx_vllm_lb.sh).
# LB rules: configs/nginx/vllm_lb.conf (template) -> results/nginx/runtime/vllm_lb.conf (runtime)
# Run: VLLM_BASE_PORT=8011 NUM_BACKENDS=4 bash scripts/nginx_vllm_lb.sh start

worker_processes auto;
error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    default_type  application/octet-stream;
    access_log    logs/access.log;

    sendfile on;
    keepalive_timeout 65;

    include ../../results/nginx/runtime/vllm_lb.conf;
}
