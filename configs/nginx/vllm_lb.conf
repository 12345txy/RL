# vLLM OpenAI API load balancer (Gemma4 SWE-bench eval).
#
# Where this file lives:
#   - Source template:  configs/nginx/vllm_lb.conf  (this file, in repo)
#   - Auto-generated:   results/nginx/vllm_lb.conf  (scripts/nginx_vllm_lb.sh)
#   - Standalone run:   results/nginx/runtime/vllm_lb.conf  (copied at start)
#   - System nginx:     /etc/nginx/conf.d/vllm_gemma4_lb.conf  (NGINX_MODE=system)
#
# Topology:
#   CPU eval  ->  SSH :8001  ->  nginx :8001  ->  vLLM :8011-8014
#
# Start vLLM backends first:
#   LORA_PATH=outputs/sft-gemma4-12b-miniswe-lora/checkpoint-150 \
#   NUM_INSTANCES=4 BASE_PORT=8011 bash scripts/serve_gemma4_12b.sh
#
# Base model (no LoRA), 8 GPUs:
#   NUM_INSTANCES=8 BASE_PORT=8011 bash scripts/serve_gemma4_12b.sh
#
# Then start nginx (standalone, no system nginx required):
#   VLLM_BASE_PORT=8011 NUM_BACKENDS=8 bash scripts/nginx_vllm_lb.sh start
#
# Or install into system nginx:
#   NGINX_MODE=system VLLM_BASE_PORT=8011 NUM_BACKENDS=4 bash scripts/nginx_vllm_lb.sh start

upstream vllm_gemma4 {
    least_conn;

    server 127.0.0.1:8011 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8012 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8013 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8014 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8015 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8016 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8017 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8018 max_fails=3 fail_timeout=30s;
}

server {
    listen 127.0.0.1:8001;
    listen 8001;

    proxy_connect_timeout 60s;
    proxy_send_timeout    960s;
    proxy_read_timeout    960s;
    client_max_body_size  64m;

    location / {
        proxy_pass http://vllm_gemma4;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header Connection        "";
        proxy_set_header X-Accel-Buffering no;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
