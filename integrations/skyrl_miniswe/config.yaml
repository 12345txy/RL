# SkyRL GRPO reference (8×H100 disaggregated)
# Launch via: bash scripts/run_rl_skyrl.sh
# Install:    bash scripts/setup_skyrl.sh

trainer:
  strategy: fsdp
  # Must be a multiple of lcm(dp_size, n_samples_per_prompt) / gcd(...).
  # With 6 policy+ref GPUs and n_samples_per_prompt=4, stride=3 so 8 prompts are trimmed to 6.
  train_batch_size: 6
  policy_mini_batch_size: 3
  max_tokens_per_microbatch: 18432
  micro_train_batch_size_per_gpu: 1
  micro_forward_batch_size_per_gpu: 1
  epochs: 5          # rl1; use 20 for rl2
  update_epochs_per_batch: 1
  algorithm:
    advantage_estimator: grpo
    use_kl_loss: true
    kl_loss_coef: 0.005
  policy:
    optimizer_config:
      lr: 5.0e-7

placement:
  colocate_all: false
  policy_num_gpus_per_node: 6
  ref_num_gpus_per_node: 6
  rollout_num_gpus: 2

generator:
  n_samples_per_prompt: 4
  batched: true
  max_turns: 20
  max_input_length: 28672
  sampling_params:
    max_generate_length: 4096
  inference_engine:
    backend: vllm
    run_engines_locally: true
    num_engines: 2
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.85
    weight_sync_backend: nccl
    async_engine: true
    enable_http_endpoint: true
    http_endpoint_host: 127.0.0.1
    http_endpoint_port: 8001
  miniswe_config_path: integrations/skyrl_miniswe/swebench.yaml

data:
  rl_pool_lite: data/rl/skyrl_parquet/train_lite.parquet
  rl_pool_full: data/rl/skyrl_parquet/train.parquet
  val_split: data/rl/skyrl_parquet/validation.parquet
  dev_split: data/splits/verified_dev_100.json

model:
  base_path: models/gemma-4-12B-it
  sft_checkpoint: outputs/sft-gemma4-12b-miniswe-full
  output_dir: outputs/rl-gemma4-12b-miniswe

reward:
  type: binary_resolve_docker
  step_penalty: 0.01

# CPU VM: Ray worker with docker_node resource runs Docker rollouts.
# GPU machine: policy FSDP + vLLM engines; NCCL syncs weights after each GRPO step.
